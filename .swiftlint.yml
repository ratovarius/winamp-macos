included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60
  allowed_symbols: ["_"]

file_length:
  warning: 600
  error: 1200

type_body_length:
  warning: 400
  error: 800

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 6
  error: 8

disabled_rules:
  - trailing_whitespace
  - trailing_newline
  - trailing_comma
  - opening_brace
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - force_unwrapping

force_unwrapping:
  severity: warning
